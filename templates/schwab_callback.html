<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=9">
    <link rel="shortcut icon" href="/favicon.ico?v=9">
    <title>Schwab sign-in — completing</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
        h1 { font-size: 1.2rem; margin-bottom: 12px; }
        .status { margin: 16px 0; padding: 12px; border-radius: 8px; }
        .status.pending { background: #16213e; color: #aac; }
        .status.ok { background: #0d3320; color: #9e9; }
        .status.error { background: #3d1a1a; color: #e88; }
        a.app-link { display: inline-block; margin-top: 12px; padding: 10px 18px; background: #0066cc; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; }
        a.app-link:hover { background: #0052a3; }
        .copy-url { margin-top: 12px; font-size: 0.85em; color: #888; }
        .copy-url input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 0.8em; background: #0f0f23; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Schwab sign-in</h1>
    <div id="status" class="status pending">Completing sign-in…</div>
    <div id="result"></div>
    <script>
        (function() {
            var redirectUrl = {{ redirect_url | tojson }};
            var statusEl = document.getElementById('status');
            var resultEl = document.getElementById('result');

            function showResult(ok, message, showCopyUrl, persistCommand) {
                statusEl.className = 'status ' + (ok ? 'ok' : 'error');
                statusEl.textContent = ok ? 'Done' : 'Something went wrong';
                var html = '<p>' + message + '</p>';
                if (persistCommand) {
                    html += '<div class="copy-url" style="margin-top:12px;"><label>To keep token on EB (run once from terminal):</label><input type="text" readonly id="persist-input" style="margin-top:6px;"></input><button type="button" id="copy-persist-btn" style="margin-top:6px;padding:6px 12px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer;">Copy command</button></div>';
                }
                if (showCopyUrl) {
                    html += '<div class="copy-url"><label>Or copy this URL and paste it in the app\'s Step 2 box:</label><input type="text" readonly id="copy-input"></div>';
                }
                html += '<a href="/" class="app-link">Back to app</a>';
                resultEl.innerHTML = html;
                if (persistCommand) {
                    var persistInput = resultEl.querySelector('#persist-input');
                    var copyBtn = resultEl.querySelector('#copy-persist-btn');
                    if (persistInput) persistInput.value = persistCommand;
                    if (copyBtn) copyBtn.onclick = function() {
                        navigator.clipboard.writeText(persistCommand).then(function() { copyBtn.textContent = 'Copied!'; });
                    };
                }
                if (showCopyUrl) {
                    var copyInput = resultEl.querySelector('#copy-input');
                    if (copyInput) { copyInput.value = redirectUrl; copyInput.onclick = function() { this.select(); document.execCommand('copy'); }; }
                }
                /* REMOVED: (showCopyUrl ? '<div class="copy-url"><label>Or copy this URL and paste it in the app’s Step 2 box:</label><input type="text" readonly id="copy-input"></div>' : '') +
                    '<a href="/" class="app-link">Back to app</a>';
                if (showCopyUrl) {
                    var copyInput = resultEl.querySelector('#copy-input');
                    if (copyInput) { copyInput.value = redirectUrl; copyInput.onclick = function() { this.select(); document.execCommand('copy'); }; }
                }
            }

            fetch('/api/schwab/exchange-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ redirect_url: redirectUrl })
            })
            .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
            .then(function(result) {
                var data = result.data || {};
                if (result.ok && data.ok) {
                    showResult(true, 'Token saved. You can return to the app.', false, data.persist_command);
                } else {
                    showResult(false, (data.error || 'Exchange failed.') + ' You can copy the URL below and paste it in the app’s Schwab setup page.', true);
                }
            })
            .catch(function(err) {
                showResult(false, 'Request failed: ' + (err.message || String(err)) + '. Copy the URL below and paste it in the app’s Step 2 box.', true);
            });
        })();
    </script>
</body>
</html>
