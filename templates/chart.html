<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=9">
    <link rel="shortcut icon" href="/favicon.ico?v=9">
    <title>TradingView Chart - <span id="ticker-display"></span></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }
        .chart-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }
        .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget" id="tradingview-widget"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // Get ticker, bearish_date, and target_date from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let ticker = urlParams.get('symbol') || 'AAPL';
        const bearishDate = urlParams.get('bearish_date');
        const targetDate = urlParams.get('target_date');
        
        // Try to detect exchange if not provided
        if (!ticker.includes(':')) {
            ticker = ticker; // Keep as-is, TradingView will try to resolve it
        }
        
        // Function to subtract trading days (excluding weekends)
        function subtractTradingDays(dateStr, days) {
            const date = new Date(dateStr + 'T00:00:00');
            let count = 0;
            while (count < days) {
                date.setDate(date.getDate() - 1);
                const dayOfWeek = date.getDay();
                // Skip weekends (Saturday = 6, Sunday = 0)
                if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                    count++;
                }
            }
            return date;
        }
        
        // Update page title only (TradingView widget shows its own header)
        document.title = bearishDate 
            ? `TradingView Chart - ${ticker} (Bearish: ${bearishDate})`
            : `TradingView Chart - ${ticker}`;

        // Build studies array
        const studies = [
            "VWAP@tv-basicstudies" // Volume Weighted Average Price indicator
        ];

        // Calculate date range: from (bearish_date - 7 trading days) to target_date
        let widgetConfig = {
            "autosize": true,
            "symbol": ticker,
            "interval": "D", // Daily interval (1D)
            "timezone": "America/New_York",
            "theme": "dark",
            "style": "1", // Candlestick chart style
            "locale": "en",
            "toolbar_bg": "#1e1e1e",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "hide_legend": false,
            "save_image": false,
            "container_id": "tradingview-widget",
            "height": 600,
            "width": "100%",
            "studies": studies,
            "show_popup_button": false,
            "popup_width": "1000",
            "popup_height": "650",
            "no_referral_id": true,
            "referral_id": "",
            "support_host": "https://www.tradingview.com",
            "allow_symbol_change": true,
            "details": true,
            "hotlist": false,
            "calendar": false,
            "news": false
        };

        // Set custom date range if both bearish_date and target_date are provided
        if (bearishDate && targetDate) {
            try {
                // Calculate start date: bearish_date - 7 trading days
                const startDate = subtractTradingDays(bearishDate, 7);
                const endDate = new Date(targetDate + 'T23:59:59');
                
                // Convert to Unix timestamps (seconds since epoch)
                const fromTimestamp = Math.floor(startDate.getTime() / 1000);
                const toTimestamp = Math.floor(endDate.getTime() / 1000);
                
                widgetConfig["from"] = fromTimestamp;
                widgetConfig["to"] = toTimestamp;
                
                console.log('Chart date range:', {
                    from: startDate.toISOString().split('T')[0],
                    to: targetDate,
                    bearish_date: bearishDate
                });
            } catch (e) {
                console.error('Error calculating date range:', e);
                // Fallback to default range
                widgetConfig["range"] = "12M";
            }
        } else {
            // Fallback to default range if dates not provided
            widgetConfig["range"] = "12M";
        }

        // Initialize TradingView widget
        const widget = new TradingView.widget(widgetConfig);
    </script>
</body>
</html>
